<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<base href="./" />
	<title>Docs preview host</title>

	<!-- ── Moka.Red globals ───────────────────────────────────────────
	     moka.css is the single combined stylesheet (reset + tokens + utilities).
	     The scoped CSS bundle (DocsPreviewHost.styles.css below) only
	     contains `[b-xxx]`-isolated component styles. The tokens those
	     styles REFERENCE (--moka-color-primary etc.) come from moka.css.
	     ──────────────────────────────────────────────────────────────── -->
	<link rel="stylesheet" href="_content/Moka.Red.Core/moka.css" />
	<link rel="stylesheet" href="_content/Moka.Red.Navigation/moka-tabs.css" />

	<!-- Blazor WASM SDK auto-bundle of every referenced library's scoped CSS -->
	<link rel="stylesheet" href="DocsPreviewHost.styles.css" />

	<!--
	  Preview-iframe layout:
	    - html/body fill the iframe and give the body a generous min-height so
	      small previews don't render in a cramped strip. The plugin-side iframe
	      min-height is 80px; this 160px min-height takes over as soon as the
	      runtime hydrates.
	    - body is a centered flex container so single-button previews sit in the
	      middle of the frame instead of the top-left corner. Padding keeps content
	      off the frame border.
	    - #preview-root (the Moka.Blazor.Repl.Host App.razor root) is ALSO a flex
	      container with wrap + gap, so multi-item examples (button sizes, badge
	      variants) flow naturally onto multiple rows instead of overflowing.
	    - All values use Moka.Red design tokens so the preview matches the rest of
	      the docs site's styling.
	-->
	<style>
		html, body {
			margin: 0;
			/*
			  Do NOT set `height: 100%` on html/body here. Doing so makes body fill the
			  iframe's current height, which creates an infinite resize loop with the
			  parent's postMessage resize handler:

			    1. body fills iframe height (say 160px)
			    2. ResizeObserver reports 160 → parent sets iframe to 160 + 16 = 176px
			    3. body now fills 176px → reports 176 → parent sets 192 → ... forever.

			  Instead we use `min-height` on body so it grows to max(content, 160px)
			  and STOPS growing once content fits — which makes the postMessage height
			  feedback idempotent.
			*/
		}

		body {
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 160px;
			padding: var(--moka-spacing-lg, 1.25rem);
			background: transparent;
			font-family: var(--moka-font-family-base, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
			font-size: var(--moka-font-size-md, 0.875rem);
			color: var(--moka-color-on-surface, #1a1a1a);
			overflow-x: hidden;
			box-sizing: border-box;
		}

		#app {
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		#preview-root {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: center;
			gap: var(--moka-spacing-sm, 0.5rem);
			width: 100%;
		}

		.wasm-loading {
			opacity: 0.5;
			font-size: var(--moka-font-size-sm, 0.8125rem);
			color: var(--moka-color-outline, #757575);
		}

		#blazor-error-ui {
			position: fixed;
			inset: auto 0 0 0;
			padding: var(--moka-spacing-sm, 0.5rem) var(--moka-spacing-md, 0.75rem);
			background: var(--moka-color-error-container, #ffebee);
			color: var(--moka-color-on-error-container, #b3261e);
			font-size: var(--moka-font-size-xs, 0.75rem);
			text-align: center;
			border-top: 1px solid var(--moka-color-error, #d32f2f);
		}
	</style>
</head>
<body>
	<div id="app"><div class="wasm-loading">Loading preview…</div></div>
	<div id="blazor-error-ui" style="display:none">
		A rendering error occurred. <a href="">Reload</a>
	</div>

	<!-- The wasmPreview bridge ships as a static web asset from
	     Moka.Blazor.Repl.Host. Must load BEFORE blazor.webassembly.js. -->
	<script src="_content/Moka.Blazor.Repl.Host/wasmPreview.js"></script>
	<script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
