<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="./" />
  <title>Docs preview host</title>

  <!-- ── Moka.Red globals (reset + tokens + base + tabs) ────────────
       The scoped CSS bundle (DocsPreviewHost.styles.css below) only
       contains `[b-xxx]`-isolated component styles. The tokens those
       styles REFERENCE (--moka-color-primary etc.) come from the global
       sheets under _content/Moka.Red.Core/. Without these four links
       preview components render as unstyled text.
       ──────────────────────────────────────────────────────────────── -->
  <link rel="stylesheet" href="_content/Moka.Red.Core/moka-reset.css" />
  <link rel="stylesheet" href="_content/Moka.Red.Core/moka-tokens.css" />
  <link rel="stylesheet" href="_content/Moka.Red.Core/moka.css" />
  <link rel="stylesheet" href="_content/Moka.Red.Navigation/moka-tabs.css" />

  <!-- Blazor WASM SDK auto-bundle of every referenced library's scoped CSS -->
  <link rel="stylesheet" href="DocsPreviewHost.styles.css" />
</head>
<body>
  <div id="app"><div style="padding:1rem;color:#888;font-family:sans-serif;font-size:13px">Loading…</div></div>
  <div id="blazor-error-ui" style="display:none">
    A rendering error occurred. <a href="">Reload</a>
  </div>

  <!-- The wasmPreview bridge ships as a static web asset from
       Moka.Blazor.Repl.Host. Must load BEFORE blazor.webassembly.js. -->
  <script src="_content/Moka.Blazor.Repl.Host/wasmPreview.js"></script>
  <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
