theme:
  name: default
  options:
    accent: "#d32f2f"
    defaultColorTheme: moka-red
    # Code window styling — kept in sync with the Moka.Red red brand.
    # `dracula` is the dark code theme whose pink/red accents match the Moka.Red palette;
    # mokadocs auto-pairs it with `catppuccin-latte` when the user toggles to light mode.
    # `macos` codeStyle gives the window-chrome (traffic-light dots) framing that visually
    # matches the rest of the Moka.Red component aesthetic.
    codeTheme: dracula
    codeStyle: macos
    # Lock the selectors so the code window always matches the brand. Remove these two
    # lines if you want end users to switch code themes/styles from the UI.
    codeThemeSelector: false
    codeStyleSelector: false

features:
  search:
    enabled: true

plugins:
  - name: mokadocs-blazor-preview
    options:
      # The mokadocs-blazor-preview plugin auto-discovers a `./preview-host/` Blazor
      # WebAssembly project under this docs root. If none exists, it scaffolds one
      # from a generic template using the `library:` package id below, then runs
      # `dotnet publish` on it (cached — only re-publishes when inputs change).
      #
      # The scaffolded files are yours to edit thereafter — mokadocs never overwrites
      # them. Add your library-specific services in preview-host/Program.cs and your
      # CSS links in preview-host/wwwroot/index.html.
      library: Moka.Red@0.1.6
      usings:
        - Moka.Red.Core.Enums
        - Moka.Red.Core.Theming
