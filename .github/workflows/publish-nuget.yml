name: Publish to NuGet & GitHub Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.1.0)'
        required: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore Moka.Red.slnx

      - name: Build
        run: dotnet build Moka.Red.slnx --no-restore -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test Moka.Red.slnx --no-build -c Release

      - name: Pack
        run: |
          PROJECTS=(
            "src/Moka.Red.Core/Moka.Red.Core.csproj"
            "src/Moka.Red.Icons/Moka.Red.Icons.csproj"
            "src/Moka.Red.Primitives/Moka.Red.Primitives.csproj"
            "src/Moka.Red.Layout/Moka.Red.Layout.csproj"
            "src/Moka.Red.Forms/Moka.Red.Forms.csproj"
            "src/Moka.Red.Feedback/Moka.Red.Feedback.csproj"
            "src/Moka.Red.Data/Moka.Red.Data.csproj"
            "src/Moka.Red.Navigation/Moka.Red.Navigation.csproj"
            "src/Moka.Red.ContextMenu/Moka.Red.ContextMenu.csproj"
            "src/Moka.Red.Diagnostics/Moka.Red.Diagnostics.csproj"
            "src/Moka.Red.ThemeGen/Moka.Red.ThemeGen.csproj"
            "src/Moka.Red/Moka.Red.csproj"
          )
          for proj in "${PROJECTS[@]}"; do
            dotnet pack "$proj" --no-build -c Release \
              -p:PackageVersion=${{ steps.version.outputs.version }} \
              -o ./nupkgs
          done

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
